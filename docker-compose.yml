# BaGet - Feed NuGet privado (crear, publicar, consultar paquetes)
# Uso: docker compose -f docker-compose.nuget.yml up -d
#
# Crear paquete:  dotnet pack -c Release
# Publicar:       dotnet nuget push -s https://nuget.ingeovisualservices.com/v3/index.json -k TU_API_KEY mi-paquete.1.0.0.nupkg
# Restaurar:      dotnet restore --source https://nuget.ingeovisualservices.com/v3/index.json
# Añadir source:  dotnet nuget add source https://nuget.ingeovisualservices.com/v3/index.json -n IngeoNuget -u usuario -p TU_API_KEY

name: telemetry-nuget

services:
  baget:
    image: loicsharma/baget:latest
    container_name: devtools-baget
    environment:
      - ApiKey=${NUGET_API_KEY:-NUGET-SERVER-API-KEY}
      - Storage__Type=FileSystem
      - Storage__Path=/var/baget/packages
      - Database__Type=Sqlite
      - Database__ConnectionString=Data Source=/var/baget/baget.db
      - Search__Type=Database
      - AllowPackageOverwrites=false
      - PackageDeletionBehavior=Unlist
      # Optimización de memoria .NET
      - DOTNET_GCHeapHardLimit=400000000
      - DOTNET_GCHeapHardLimitPercent=75
    volumes:
      - baget-data:/var/baget
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
        reservations:
          cpus: "0.25"
          memory: "256M"
    networks:
      - dokploy-network
    restart: unless-stopped
    ports:
      - "80"

networks:
  dokploy-network:
    external: true

volumes:
  baget-data:
